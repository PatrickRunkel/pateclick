<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>PateClick | Admin Mini</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00d4ff; --pink: #ff00ff; --bg: #0b0e1a; --card-bg: rgba(20, 25, 45, 0.95); }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }

        .admin-card { 
            background: var(--card-bg); 
            border: 2px solid var(--blue); 
            border-radius: 15px; 
            width: 320px; /* Schön schmal für die Bildschirmecke */
            padding: 20px; 
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            text-align: center;
        }

        h1 { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 1.2rem; 
            margin: 0 0 15px 0; 
            background: linear-gradient(90deg, var(--blue), var(--pink)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .status-mini { 
            font-size: 0.8rem; 
            margin-bottom: 15px; 
            padding: 5px; 
            background: rgba(0,0,0,0.3); 
            border-radius: 8px;
            display: flex;
            justify-content: space-around;
        }

        button { 
            cursor: pointer; 
            font-family: 'Orbitron', sans-serif; 
            font-weight: bold; 
            border-radius: 8px; 
            border: none; 
            width: 100%;
            transition: 0.2s;
        }

        /* Der Haupt-Button */
        .btn-quick { 
            padding: 18px; 
            background: var(--pink); 
            color: white; 
            font-size: 0.9rem; 
            margin-bottom: 15px; 
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }
        
        .btn-quick:active { transform: scale(0.95); }

        .controls-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
        }

        .btn-start { padding: 12px; background: var(--blue); color: #000; font-size: 0.7rem; }
        .btn-reset { padding: 12px; background: #330000; color: #ff4444; border: 1px solid #ff4444; font-size: 0.7rem; }

        .toast { 
            position: fixed; 
            top: 10px; 
            background: var(--blue); 
            color: black; 
            padding: 8px 15px; 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: 0.8rem;
            opacity: 0; 
            transition: 0.3s; 
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <div class="admin-card">
        <h1>COMMAND</h1>
        
        <div class="status-mini">
            <span>Reg: <strong id="reg-status" style="color:#00ff00">OFFEN</strong></span>
            <span>Spieler: <strong id="p-count" style="color:var(--blue)">0/10</strong></span>
        </div>

        <button id="quick-ticket-btn" class="btn-quick">CODE GENERIEREN</button>

        <div class="controls-row">
            <button class="btn-start" onclick="socket.emit('adminStartGame')">START</button>
            <button class="btn-reset" onclick="socket.emit('adminResetGame')">RESET</button>
        </div>
    </div>

    <div id="toast" class="toast">KOPIERT!</div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const toast = document.getElementById('toast');
        const quickBtn = document.getElementById('quick-ticket-btn');
        const pCount = document.getElementById('p-count');

        function showToast(text) {
            toast.innerText = text;
            toast.style.opacity = "1";
            setTimeout(() => { toast.style.opacity = "0"; }, 1200);
        }

        // Ticket generieren & kopieren
        quickBtn.onclick = () => {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // Ohne Verwechslungsgefahr (0, O, I, 1)
            let code = '';
            for (let i = 0; i < 5; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
            
            socket.emit('addSingleTicket', code);
            navigator.clipboard.writeText(code);
            showToast("CODE " + code + " KOPIERT!");
            
            quickBtn.style.background = "#4CAF50";
            setTimeout(() => quickBtn.style.background = "var(--pink)", 500);
        };

        // Spieleranzahl aktuell halten
        socket.on('updateScoreboard', (players) => {
            pCount.innerText = players.length + "/10";
        });

        socket.on('ticketStatusChanged', (isOpen) => {
            const statusEl = document.getElementById('reg-status');
            statusEl.innerText = isOpen ? "OFFEN" : "ZU";
            statusEl.style.color = isOpen ? "#00ff00" : "#ff4444";
        });
    </script>
</body>
</html>
