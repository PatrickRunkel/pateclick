<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>PateClick | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00d4ff; --pink: #ff00ff; --bg: #0b0e1a; --card-bg: rgba(20, 25, 45, 0.95); }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .admin-card { background: var(--card-bg); border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 20px; width: 100%; max-width: 500px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h1 { font-family: 'Orbitron', sans-serif; text-align: center; background: linear-gradient(90deg, var(--blue), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-bar { display: flex; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 12px 20px; border-radius: 12px; margin-bottom: 25px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        button { cursor: pointer; font-family: 'Orbitron', sans-serif; font-weight: bold; border-radius: 10px; border: none; text-transform: uppercase; transition: 0.2s; }
        .btn-start { padding: 15px; background: var(--blue); color: #000; }
        .btn-reset { padding: 15px; background: transparent; color: #ff4444; border: 1px solid #ff4444; }
        #ticket-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-height: 250px; overflow-y: auto; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 12px; }
        .ticket-btn { background: #161b33; border: 1px solid #2a2f4a; color: var(--blue); padding: 10px 5px; font-size: 0.7rem; font-family: monospace; border-radius: 6px; width: 100%; }
        .ticket-btn.copied { background: var(--blue); color: black; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--pink); padding: 10px 20px; border-radius: 30px; opacity: 0; transition: 0.3s; pointer-events: none; }
    </style>
</head>
<body>
    <div class="admin-card">
        <h1>COMMAND CENTER</h1>
        <div class="status-bar">
            <span>Server: <strong style="color:var(--blue)">LIVE</strong></span>
            <span>Einlass: <strong id="reg-status" style="color:#00ff00">OFFEN</strong></span>
        </div>
        <div class="controls">
            <button class="btn-start" onclick="socket.emit('adminStartGame')">Runde Starten</button>
            <button class="btn-reset" onclick="socket.emit('adminResetGame')">Reset</button>
        </div>
        <h3>Codes (Klick = Kopieren)</h3>
        <div id="ticket-grid"></div>
    </div>
    <div id="toast" class="toast">CODE KOPIERT!</div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const grid = document.getElementById('ticket-grid');
        const toast = document.getElementById('toast');

        socket.on('updateTicketList', (tickets) => {
            grid.innerHTML = '';
            tickets.forEach(code => {
                const btn = document.createElement('button');
                btn.className = 'ticket-btn'; btn.innerText = code;
                btn.onclick = () => {
                    navigator.clipboard.writeText(code);
                    btn.classList.add('copied');
                    toast.style.opacity = "1";
                    setTimeout(() => { btn.classList.remove('copied'); toast.style.opacity = "0"; }, 1000);
                };
                grid.appendChild(btn);
            });
        });

        socket.on('ticketStatusChanged', (isOpen) => {
            const statusEl = document.getElementById('reg-status');
            statusEl.innerText = isOpen ? "OFFEN" : "ZU";
            statusEl.style.color = isOpen ? "#00ff00" : "#ff4444";
        });
    </script>
</body>
</html>
